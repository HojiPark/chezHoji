<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>My Blog</title>
  <link rel="stylesheet" href="https://unpkg.com/@sakun/system.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Header window: identity + email at the top -->
  <div class="window page-window">
    <div class="title-bar">
      <button aria-label="Close" class="close"></button>
      <h1 class="title">My Blog</h1>
      <button aria-label="Resize" class="resize"></button>
    </div>
    <div class="separator"></div>
    <div class="window-pane">
      <header class="blog-header">
        <div class="avatar" aria-label="pixel art placeholder">☕🌿</div>
        <div class="identity">
          <div class="name">This is Boeun Park</div>
          <div class="alias">(also Claire)</div>
        </div>
      </header>
    </div>
  </div>

  <!-- Feed: latest posts with full bodies, injected by app.js -->
  <div id="feed" class="feed">
    <div class="window page-window"><div class="window-pane">Loading…</div></div>
  </div>

  <!-- Older posts: a button that expands the rest into the feed (no separate page) -->
  <div id="older" hidden style="max-width: 640px; margin: 0 auto 24px; text-align: center;">
    <button id="show-older">▾ Show older posts</button>
  </div>
  <div id="older-feed" class="feed"></div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="app.js" defer></script>
</body>
</html>
